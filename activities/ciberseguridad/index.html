<style>
/* ═══════════════════════════
   RESET & VARIABLES
═══════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:     #0B1929;
  --navy2:    #122236;
  --blue:     #1A6FD4;
  --blueL:    #2E8EF7;
  --blueXL:   #E8F3FE;
  --green:    #1B8A4E;
  --greenL:   #27AE65;
  --greenBg:  #E6F7EE;
  --orange:   #D4530A;
  --orangeL:  #F07030;
  --orangeBg: #FEF0E6;
  --red:      #C0272D;
  --redBg:    #FDEAEA;
  --gold:     #F5C842;
  --goldD:    #D4A820;
  --white:    #FFFFFF;
  --off:      #F4F6F9;
  --gray:     #64748B;
  --grayL:    #E2E8F0;
  --text:     #1A2332;
  --engC:     #4A6FA5;
  --engBg:    #EEF3FB;
  --topbar-h: 54px;
  --dots-h:   40px;
  --chrome-h: calc(var(--topbar-h) + var(--dots-h));
}

/* ═══════════════════════════
   PAGE LAYOUT
   Cards fill available space,
   no overflow:hidden on body
═══════════════════════════ */
html {
  height: 100%;
  background: var(--navy);
}
body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  /* NO overflow:hidden — cards must be able to grow */
}

/* ═══════════════════════════
   BACKGROUND ORBS
═══════════════════════════ */
.bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: .16; }
.orb-1 { width: 700px; height: 700px; background: var(--blue);  top: -200px; left: -180px; animation: orbF 20s ease-in-out infinite; }
.orb-2 { width: 550px; height: 550px; background: var(--green); bottom: -150px; right: -100px; animation: orbF 26s ease-in-out infinite reverse; }
.orb-3 { width: 400px; height: 400px; background: var(--gold);  top: 35%; right: 8%; animation: orbF 16s ease-in-out infinite 4s; }
@keyframes orbF { 0%,100%{transform:translate(0,0)} 33%{transform:translate(40px,-28px)} 66%{transform:translate(-28px,40px)} }

/* ═══════════════════════════
   TOP BAR
═══════════════════════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  height: var(--topbar-h);
  background: rgba(11,25,41,.92); backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.8rem;
}
.tb-brand { display: flex; align-items: center; gap: .6rem; }
.tb-icon  { font-size: 1.5rem; filter: drop-shadow(0 0 10px rgba(245,200,66,.55)); }
.tb-title { font-family: 'Fraunces', serif; font-size: 1.05rem; font-weight: 700; color: var(--gold); letter-spacing: .02em; }
.tb-counter { font-size: .85rem; color: rgba(255,255,255,.4); font-weight: 500; }

/* ═══════════════════════════
   PROGRESS DOTS BAR
═══════════════════════════ */
.dots-bar {
  position: fixed; top: var(--topbar-h); left: 0; right: 0; z-index: 199;
  height: var(--dots-h);
  background: rgba(11,25,41,.78); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: center;
  gap: .5rem; padding: 0 1.5rem; flex-wrap: wrap;
}
.dot {
  width: 11px; height: 11px; border-radius: 50%;
  background: rgba(255,255,255,.15); border: 2px solid transparent;
  cursor: pointer; transition: all .3s; flex-shrink: 0;
}
.dot:hover:not(.locked) { background: rgba(255,255,255,.35); }
.dot.visited   { background: rgba(245,200,66,.4);  border-color: rgba(245,200,66,.6); }
.dot.active    { background: var(--gold); border-color: var(--gold); transform: scale(1.5); box-shadow: 0 0 10px rgba(245,200,66,.7); }
.dot.locked    { cursor: not-allowed; opacity: .3; }
.dot-sep       { width: 18px; height: 1.5px; background: rgba(255,255,255,.12); border-radius: 1px; }

/* ═══════════════════════════
   STAGE — full remaining height
═══════════════════════════ */
.stage {
  position: relative;
  z-index: 10;
  width: 100%;
  /* Use full width minus generous side padding */
  max-width: min(920px, calc(100vw - 2rem));
  margin-top: var(--chrome-h);
  padding: 1.5rem 0 2rem;
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  /* Allow vertical growth — no overflow clip */
}

/* ═══════════════════════════
   CARD
═══════════════════════════ */
.card {
  width: 100%;
  background: var(--white);
  border-radius: 20px;
  box-shadow: 0 28px 70px rgba(0,0,0,.28), 0 10px 24px rgba(0,0,0,.16);
  display: flex; flex-direction: column;
  overflow: hidden;
  /* Minimum fills most of visible area; grows with content */
  min-height: calc(100vh - var(--chrome-h) - 3.5rem);
  position: absolute;
  transition: transform .48s cubic-bezier(.4,0,.2,1), opacity .48s ease;
  will-change: transform, opacity;
}
.card.active        { transform: translateX(0) scale(1); opacity: 1; position: relative; }
.card.exit-left     { transform: translateX(-108%) scale(.93); opacity: 0; pointer-events: none; }
.card.exit-right    { transform: translateX(108%) scale(.93);  opacity: 0; pointer-events: none; }
.card.enter-left    { transform: translateX(-108%) scale(.93); opacity: 0; pointer-events: none; }
.card.enter-right   { transform: translateX(108%) scale(.93);  opacity: 0; pointer-events: none; }
.card.gone          { display: none; }

/* ── Card header ── */
.card-head {
  padding: 1.25rem 1.8rem 1.1rem;
  display: flex; align-items: center; gap: .9rem;
  flex-shrink: 0;
}
.ch-icon {
  width: 48px; height: 48px; border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.55rem; flex-shrink: 0;
}
.ch-titles { flex: 1; min-width: 0; }
.ch-phase  { font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; opacity: .7; color: #fff; }
.ch-title  { font-family: 'Fraunces', serif; font-size: 1.35rem; font-weight: 800; color: #fff; line-height: 1.2; margin-top: .1rem; }
.ch-en     { font-size: .82rem; opacity: .6; font-style: italic; color: #fff; margin-top: .15rem; }

/* ── Card body (scrollable, grows) ── */
.card-body {
  padding: 1.8rem 2rem;
  flex: 1;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--grayL) transparent;
}
.card-body::-webkit-scrollbar { width: 5px; }
.card-body::-webkit-scrollbar-thumb { background: var(--grayL); border-radius: 3px; }

/* ── Card footer ── */
.card-foot {
  padding: 1rem 1.8rem;
  border-top: 1px solid var(--grayL);
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  flex-shrink: 0;
  background: var(--off);
}
.foot-hint {
  font-size: .82rem; color: var(--engC); font-style: italic; flex: 1;
  display: flex; align-items: center; gap: .4rem;
}

/* ═══════════════════════════
   BUTTONS
═══════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: .65rem 1.4rem; border-radius: 40px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: .95rem; font-weight: 600;
  cursor: pointer; transition: all .22s; white-space: nowrap; line-height: 1;
}
.btn-gold   { background: var(--gold);  color: var(--navy); box-shadow: 0 4px 14px rgba(245,200,66,.35); }
.btn-gold:hover   { background: var(--goldD); transform: translateY(-2px); box-shadow: 0 7px 22px rgba(245,200,66,.5); }
.btn-ghost  { background: transparent; color: var(--gray); border: 2px solid var(--grayL); }
.btn-ghost:hover  { background: var(--grayL); color: var(--text); }
.btn-green  { background: var(--green); color: #fff; }
.btn-green:hover  { background: var(--greenL); transform: translateY(-2px); }
.btn-blue   { background: var(--blue);  color: #fff; }
.btn-blue:hover   { background: var(--blueL);  transform: translateY(-2px); }
.btn-pdf    { background: linear-gradient(135deg, var(--orange), var(--orangeL)); color: #fff; box-shadow: 0 4px 16px rgba(212,83,10,.35); }
.btn-pdf:hover    { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(212,83,10,.5); }
.btn-nav    { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); border: 1.5px solid rgba(255,255,255,.18); }
.btn-nav:hover    { background: rgba(255,255,255,.2); color: #fff; }

/* ═══════════════════════════
   HERO CARD
═══════════════════════════ */
.hero-inner {
  background: var(--navy);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center;
  padding: 3.5rem 2.5rem 2.5rem;
  flex: 1; gap: .8rem;
}
.hero-shield { font-size: 5.5rem; filter: drop-shadow(0 0 40px rgba(245,200,66,.5)); animation: shieldPulse 3s ease-in-out infinite; }
@keyframes shieldPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
.hero-title  { font-family: 'Fraunces', serif; font-size: clamp(2.5rem, 5vw, 3.6rem); font-weight: 900; color: var(--gold); letter-spacing: -.02em; }
.hero-sub    { font-family: 'Fraunces', serif; font-size: clamp(1rem, 2.2vw, 1.3rem); color: rgba(255,255,255,.7); font-style: italic; }
.hero-en     { font-size: clamp(.85rem, 1.5vw, 1rem); color: var(--engC); font-style: italic; }
.hero-tags   { display: flex; gap: .7rem; flex-wrap: wrap; justify-content: center; margin-top: .5rem; }
.h-tag       { padding: .4rem 1.1rem; border-radius: 22px; font-size: .85rem; font-weight: 600; color: #fff; }
.hero-std    { font-size: .8rem; color: rgba(255,255,255,.3); margin-top: .2rem; }

/* ═══════════════════════════
   OBJECTIVES
═══════════════════════════ */
.obj-item {
  display: flex; gap: 1.1rem; align-items: flex-start;
  background: var(--off); border-radius: 12px;
  padding: 1.1rem 1.4rem; margin-bottom: .9rem;
}
.obj-icon  { font-size: 1.8rem; flex-shrink: 0; margin-top: .05rem; }
.obj-es    { font-weight: 700; font-size: 1rem; }
.obj-en    { font-size: .85rem; color: var(--engC); font-style: italic; margin-top: .2rem; }

/* ═══════════════════════════
   VOCABULARY
═══════════════════════════ */
.vocab-item {
  display: flex; margin-bottom: .9rem; border-radius: 12px;
  overflow: hidden; border: 2px solid var(--blueXL);
  transition: transform .2s, box-shadow .2s;
}
.vocab-item:hover { transform: translateX(4px); box-shadow: 0 5px 18px rgba(26,111,212,.16); }
.vi-left {
  background: var(--blue); color: #fff;
  padding: .9rem 1.2rem; min-width: 170px;
  display: flex; align-items: center; gap: .5rem;
  font-weight: 700; font-size: 1rem; flex-shrink: 0;
}
.vi-right { background: var(--blueXL); padding: .9rem 1.2rem; flex: 1; }
.vi-es    { font-size: .97rem; color: var(--text); font-weight: 500; }
.vi-en    { font-size: .83rem; color: var(--engC); font-style: italic; margin-top: .25rem; }

/* ═══════════════════════════
   GESTURES
═══════════════════════════ */
.gesture-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.1rem;
  margin-bottom: 1.1rem;
}
.gc {
  border-radius: 14px; padding: 1.4rem 1rem; text-align: center;
  border: 2px solid; transition: transform .25s, box-shadow .25s;
}
.gc:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,.13); }
.gc-emoji  { font-size: 2.6rem; margin-bottom: .65rem; }
.gc-word   { font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 800; margin-bottom: .18rem; }
.gc-word-en{ font-size: .8rem; color: var(--engC); font-style: italic; margin-bottom: .65rem; }
.gc-g      { font-size: .88rem; color: var(--gray); }
.gc-g-en   { font-size: .78rem; color: var(--engC); font-style: italic; margin-top: .18rem; }
.seq-note  {
  background: var(--blueXL); border-radius: 10px;
  padding: .85rem 1.1rem; font-size: .9rem; color: var(--blue);
}

/* ═══════════════════════════
   MODEL SENTENCES + BUILDER
═══════════════════════════ */
.model-s {
  border-left: 5px solid var(--green); background: var(--greenBg);
  border-radius: 0 12px 12px 0; padding: 1.1rem 1.4rem; margin-bottom: 1rem;
}
.ms-es { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 800; color: var(--green); }
.ms-en { font-size: .88rem; color: var(--engC); font-style: italic; margin-top: .3rem; }
.struct-note {
  background: var(--blueXL); border-radius: 10px;
  padding: .75rem 1.1rem; font-size: .9rem; color: var(--blue); margin: 1rem 0;
}
.sb-section-label { font-size: .95rem; font-weight: 700; color: var(--navy); margin: 1.2rem 0 .7rem; }
.sb-item {
  background: var(--blueXL); border-radius: 12px;
  padding: 1.1rem 1.3rem; margin-bottom: .9rem;
  border: 2px solid var(--blue);
}
.sb-prompt    { font-weight: 700; font-size: 1.05rem; color: var(--navy); margin-bottom: .18rem; }
.sb-prompt-en { font-size: .83rem; color: var(--engC); font-style: italic; margin-bottom: .65rem; }
.sb-inp {
  width: 100%; border: 2px solid #CBD5E1; border-radius: 8px;
  padding: .65rem 1rem; font-family: 'DM Sans', sans-serif; font-size: 1rem;
  transition: border-color .2s; background: #fff;
}
.sb-inp:focus { outline: none; border-color: var(--blue); }
.sb-fb { margin-top: .45rem; font-size: .85rem; min-height: 1.2em; }
.sb-fb.ok  { color: var(--green); } .sb-fb.err { color: var(--red); }

/* ═══════════════════════════
   SCENARIOS
═══════════════════════════ */
.sc-hint { font-size: .9rem; color: var(--gray); margin-bottom: 1.1rem; font-style: italic; }
.sc-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1.1rem; margin-bottom: 1.1rem;
}
.sc-card {
  border-radius: 14px; padding: 1.3rem 1rem; text-align: center;
  border: 2px solid; cursor: pointer; transition: all .25s;
}
.sc-card:hover { transform: translateY(-4px); box-shadow: 0 10px 24px rgba(0,0,0,.15); }
.sc-card.sel-sc { box-shadow: 0 0 0 4px var(--gold); }
.sc-badge {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto .65rem; font-weight: 900; font-size: 1.05rem; color: #fff;
}
.sc-icon { font-size: 2rem; margin-bottom: .5rem; }
.sc-es   { font-size: .95rem; font-weight: 700; margin-bottom: .2rem; }
.sc-en   { font-size: .8rem;  color: var(--engC); font-style: italic; }
.sc-qs   { font-size: .78rem; color: var(--gray); font-style: italic; margin-top: .45rem; }
.sc-answer { border-radius: 12px; overflow: hidden; display: none; }
.sc-answer.show { display: block; animation: fadeUp .35s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.sc-prob { background: var(--redBg);  border-left: 5px solid var(--red);   padding: 1rem 1.3rem; }
.sc-sol  { background: var(--greenBg);border-left: 5px solid var(--green); padding: 1rem 1.3rem; }
.sc-lbl  { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: .4rem; }
.sc-body-es { font-weight: 700; font-size: 1rem; line-height: 1.55; }
.sc-body-en { font-size: .83rem; color: var(--engC); font-style: italic; margin-top: .3rem; }

/* ═══════════════════════════
   DANGERS
═══════════════════════════ */
.danger-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.1rem;
}
.d-card {
  border-radius: 14px; padding: 1.3rem 1.2rem;
  border: 2px solid; transition: transform .25s, box-shadow .25s;
}
.d-card:hover { transform: translateY(-3px); box-shadow: 0 8px 22px rgba(0,0,0,.12); }
.d-icon    { font-size: 2rem; margin-bottom: .55rem; }
.d-es      { font-weight: 700; font-size: 1rem; margin-bottom: .18rem; }
.d-en      { font-size: .82rem; color: var(--engC); font-style: italic; margin-bottom: .55rem; }
.d-rule    { font-size: .9rem; color: var(--gray); }
.d-rule-en { font-size: .8rem; color: var(--engC); font-style: italic; }

/* ═══════════════════════════
   RULES
═══════════════════════════ */
.rule-row {
  display: flex; gap: 1rem; align-items: flex-start;
  background: var(--greenBg); border-radius: 12px;
  padding: 1rem 1.3rem; margin-bottom: .8rem;
  border: 1.5px solid var(--greenL);
}
.rule-n {
  width: 34px; height: 34px; border-radius: 50%; background: var(--green);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .95rem; flex-shrink: 0;
}
.rule-es { font-weight: 700; color: var(--green); font-size: 1rem; }
.rule-en { font-size: .83rem; color: var(--engC); font-style: italic; margin-top: .2rem; }
.challenge-box {
  background: var(--orangeBg); border-radius: 12px; border-left: 5px solid var(--orange);
  padding: 1rem 1.3rem; margin-top: .5rem;
}

/* ═══════════════════════════
   SUMMARY
═══════════════════════════ */
.sum-item {
  border-radius: 12px; padding: 1rem 1.3rem; margin-bottom: .85rem;
  border-left: 5px solid; display: flex; gap: .9rem; align-items: flex-start;
}
.sum-icon    { font-size: 1.5rem; margin-top: .05rem; }
.sum-label   { font-size: .82rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .3rem; }
.sum-content { font-size: .9rem; color: var(--text); line-height: 1.5; }
.quote-box {
  background: var(--navy); border-radius: 12px; padding: 1.1rem 1.4rem;
  text-align: center; margin: .5rem 0 1rem;
}
.prog-gate {
  background: var(--off); border-radius: 12px;
  padding: 1rem 1.3rem; border: 2px dashed var(--grayL);
}
.prog-bar-wrap { height: 8px; background: var(--grayL); border-radius: 4px; overflow: hidden; margin: .5rem 0 .4rem; }
.prog-bar-fill { height: 100%; border-radius: 4px; transition: width .6s; }

/* ═══════════════════════════
   LOCK CARD
═══════════════════════════ */
.lock-inner {
  background: var(--navy); flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 3rem 2.5rem; gap: 1.2rem;
}
.lock-icon  { font-size: 4.5rem; filter: drop-shadow(0 0 24px rgba(245,200,66,.35)); }
.lock-title { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 900; color: var(--gold); }
.lock-text  { font-size: 1rem; color: rgba(255,255,255,.6); max-width: 380px; line-height: 1.6; }
.lock-prog  { background: rgba(255,255,255,.08); border-radius: 12px; padding: 1.2rem 1.8rem; width: 100%; max-width: 380px; }
.lp-label   { font-size: .85rem; color: rgba(255,255,255,.55); margin-bottom: .55rem; }
.lp-bar     { height: 8px; background: rgba(255,255,255,.12); border-radius: 4px; overflow: hidden; margin-bottom: .45rem; }

<body>

<!-- Background -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<!-- Top bar -->
<div class="topbar">
  <div class="tb-brand">
    <span class="tb-icon">🛡️</span>
    <span class="tb-title">Ciberseguridad</span>
  </div>
  <span class="tb-counter" id="tbCounter">Tarjeta 1 de 10</span>
</div>

<!-- Progress dots -->
<div class="dots-bar" id="dotsBar"></div>

<!-- Card stage -->
<div class="stage" id="stage"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════════ */
const SCENARIOS = {
  A: { prob_es:"Comparte su contraseña con un amigo.",
       prob_en:"He/She shares his/her password with a friend.",
       sol_es:"No debe compartir su contraseña.\nDebe proteger su información personal.",
       sol_en:"He/She must not share his/her password.\nHe/She must protect his/her personal information." },
  B: { prob_es:"Habla con un extraño en internet.",
       prob_en:"He/She talks to a stranger on the internet.",
       sol_es:"No debe hablar con extraños en línea.\nDebe avisar a un adulto de confianza.",
       sol_en:"He/She must not talk to strangers online.\nHe/She must tell a trusted adult." },
  C: { prob_es:"Publica su dirección y número de teléfono en redes sociales.",
       prob_en:"He/She posts his/her address and phone number on social media.",
       sol_es:"No debe publicar información personal en línea.\nDebe proteger su información personal.",
       sol_en:"He/She must not post personal information online.\nHe/She must protect his/her personal information." }
};

const QUESTIONS = [
  { type:"mc", es:"¿Qué significa 'contraseña'?", en:"What does 'contraseña' mean?",
    opts:["Un correo electrónico / An email address","Una palabra secreta para acceder a cuentas / A secret word to access accounts","Un tipo de sitio web / A type of website","El nombre completo / A person's full name"], ans:1 },
  { type:"mc", es:"¿Qué es 'ciberseguridad'?", en:"What is 'ciberseguridad'?",
    opts:["Un videojuego / A video game","Compartir información en línea / Sharing information online","Proteger cuentas e información en internet / Protecting accounts and info online","Una plataforma social / A social media platform"], ans:2 },
  { type:"mc", es:"¿Cuál de estas acciones es CORRECTA?", en:"Which of these actions is CORRECT?",
    opts:["Compartir tu contraseña / Sharing your password","Hablar con extraños en línea / Talking to strangers online","Proteger tu información personal / Protecting your personal information","Publicar tu dirección en internet / Posting your address online"], ans:2 },
  { type:"tf", es:"¿Verdadero o Falso? Compartir tu contraseña con un amigo es seguro.",
                en:"True or False? Sharing your password with a friend is safe.", ans:false },
  { type:"tf", es:"¿Verdadero o Falso? 'Proteger' significa no dejar que otros accedan a tu información.",
                en:"True or False? 'Proteger' means to prevent others from accessing your information.", ans:true },
  { type:"mc", es:"Completa: 'Yo ______ mi información personal.'",
                en:"Complete: 'I ______ my personal information.'",
    opts:["comparto / share","publico / post","protejo / protect","ignoro / ignore"], ans:2 },
  { type:"mc", es:"Completa: 'No comparto mi ______.'", en:"Complete: 'I do not share my ______.'",
    opts:["seguridad / security","internet","contraseña / password","computadora / computer"], ans:2 },
  { type:"tf", es:"¿Verdadero o Falso? Es seguro hablar con extraños en internet.",
                en:"True or False? It is safe to talk to strangers on the internet.", ans:false },
  { type:"mc", es:"Ana publica su número de teléfono en internet. ¿Qué debe hacer?",
                en:"Ana posts her phone number online. What should she do?",
    opts:["Continuar publicando más / Continue posting more","No debe publicar información personal — debe protegerla / She must not post personal info — she must protect it","Compartirlo con más personas / Share it with more people","Cambiar su foto de perfil / Change her profile picture"], ans:1 },
  { type:"mc", es:"¿Cuál es la traducción correcta de 'seguridad'?", en:"What is the correct translation of 'seguridad'?",
    opts:["Password / Contraseña","Internet","Safety / Security — Seguridad","Personal Information / Información personal"], ans:2 },
  { type:"tf", es:"¿Verdadero o Falso? 'Información personal' incluye tu nombre, dirección y número de teléfono.",
                en:"True or False? 'Personal information' includes your name, address, and phone number.", ans:true },
  { type:"mc", es:"¿Cuál de estas es una REGLA de ciberseguridad?", en:"Which of these is a cybersecurity RULE?",
    opts:["Compartir contraseñas solo con amigos / Share passwords with friends","Publicar la dirección solo en sitios seguros / Post address on safe sites only","Usar internet responsablemente y proteger información personal / Use internet responsibly and protect personal info","Hablar con extraños si parecen amigables / Talk to strangers if friendly"], ans:2 }
];

/* Card definitions — lessonCard=true means it counts toward unlock */
const CARDS = [
  { id:'hero',      type:'hero',    dot:'🏠', lesson:false },
  { id:'obj',       type:'lesson',  dot:'🎯', lesson:true,
    head:{ bg:'#0D1B2A',  iconBg:'#1A6FD4', icon:'🎯', phase:'Sesión 1',         es:'Objetivos de Aprendizaje',    en:'Learning Objectives' },
    eng:'Read each objective in Spanish and English before continuing.' },
  { id:'vocab',     type:'lesson',  dot:'📘', lesson:true,
    head:{ bg:'#1565C0',  iconBg:'#fff',    icon:'📘', phase:'Vocabulario',       es:'Palabras Importantes',        en:'Key Words' },
    eng:'Say each Spanish word aloud 3 times before moving on.' },
  { id:'gesture',   type:'lesson',  dot:'✊', lesson:true,
    head:{ bg:'#1B5E20',  iconBg:'#43A047', icon:'✊', phase:'Codificación Dual', es:'Aprende con Gestos',          en:'Learn with Gestures' },
    eng:'Say the word → make the gesture → say the definition. Repeat × 3.' },
  { id:'models',    type:'lesson',  dot:'✏️', lesson:true,
    head:{ bg:'#2E7D32',  iconBg:'#fff',    icon:'✏️', phase:'Oraciones Modelo',  es:'Observa y Practica',          en:'Observe and Practice' },
    eng:'Use vocabulary from Card 2 to complete each sentence.' },
  { id:'scenarios', type:'lesson',  dot:'🕵️',lesson:true,
    head:{ bg:'#7B1E1E',  iconBg:'#C0272D', icon:'🕵️',phase:'Sesión 2',          es:'Resuelve el Problema',        en:'Solve the Problem' },
    eng:'Try to answer in Spanish before tapping. Pattern: "No debe… / Debe…"' },
  { id:'danger',    type:'lesson',  dot:'⚠️', lesson:true,
    head:{ bg:'#7B2A00',  iconBg:'#D4530A', icon:'⚠️', phase:'Señales de Peligro','es':'Identifica el Peligro',     en:'Identify the Danger' },
    eng:'Match each danger to a vocabulary word from Card 2.' },
  { id:'rules',     type:'lesson',  dot:'📋', lesson:true,
    head:{ bg:'#1B5E20',  iconBg:'#43A047', icon:'📋', phase:'Reglas',            es:'Reglas para Tecnología Segura',en:'Rules for Safe Technology' },
    eng:'Cover the English and say each rule from memory in Spanish!' },
  { id:'summary',   type:'lesson',  dot:'⭐', lesson:true,
    head:{ bg:'#0B1929',  iconBg:'#F5C842', icon:'⭐', phase:'Resumen',           es:'¡Lo logramos!',               en:"We Did It!" },
    eng:"Complete all cards to unlock the quiz. Check your progress below." },
  { id:'quiz',      type:'quiz',    dot:'🎯', lesson:false },
  { id:'results',   type:'results', dot:'🏆', lesson:false },
];

/* ═══════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════ */
let current      = 0;
let visited      = new Set([0]);
let lessonDone   = false;
let qAnswers     = new Array(QUESTIONS.length).fill(null);
let qLocked      = new Array(QUESTIONS.length).fill(false);
let qScore       = 0;
let qSubmitted   = false;

const LESSON_IDXS = CARDS.map((c,i) => c.lesson ? i : -1).filter(i => i >= 0);

function checkLessonDone() {
  if (LESSON_IDXS.every(i => visited.has(i))) lessonDone = true;
}

/* ═══════════════════════════════════════════════════
   DOTS
═══════════════════════════════════════════════════ */
function buildDots() {
  const bar = document.getElementById('dotsBar');
  bar.innerHTML = '';
  CARDS.forEach((c, i) => {
    if (i === CARDS.length - 1) return; // hide results dot until reached
    // separator before quiz dot
    if (i === 9) {
      const sep = document.createElement('div');
      sep.className = 'dot-sep';
      bar.appendChild(sep);
    }
    const d = document.createElement('div');
    d.className = 'dot';
    d.id = `dot-${i}`;
    d.title = (c.head?.es || c.id);
    if (i === current)      d.classList.add('active');
    else if (visited.has(i)) d.classList.add('visited');
    if (i === 9 && !lessonDone) d.classList.add('locked');
    d.onclick = () => {
      if (i === 9 && !lessonDone) { showToast('🔒 Completa la lección primero / Complete the lesson first'); return; }
      if (i === 10) return;
      nav(i, 'any');
    };
    bar.appendChild(d);
  });
}

function refreshDots() {
  CARDS.forEach((c, i) => {
    if (i === CARDS.length - 1) return;
    const d = document.getElementById(`dot-${i}`);
    if (!d) return;
    d.className = 'dot';
    if (i === current)       d.classList.add('active');
    else if (visited.has(i)) d.classList.add('visited');
    if (i === 9 && !lessonDone) d.classList.add('locked');
  });
  const vis = current <= 9 ? current + 1 : 10;
  document.getElementById('tbCounter').textContent = `Tarjeta ${vis} de 10`;
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════════ */
function nav(idx, dir) {
  if (idx === current) return;
  const stage    = document.getElementById('stage');
  const oldCard  = stage.querySelector('.card.active');
  const going    = dir === 'any' ? (idx > current ? 'forward' : 'back') : dir;

  if (oldCard) {
    oldCard.classList.remove('active');
    oldCard.classList.add(going === 'forward' ? 'exit-left' : 'exit-right');
    const el = oldCard;
    setTimeout(() => { el.classList.add('gone'); el.classList.remove('exit-left','exit-right'); }, 500);
  }

  current = idx;
  visited.add(idx);
  checkLessonDone();

  const div = document.createElement('div');
  div.className = `card ${going === 'forward' ? 'enter-right' : 'enter-left'}`;
  div.innerHTML = renderCard(CARDS[idx]);
  stage.appendChild(div);

  requestAnimationFrame(() => requestAnimationFrame(() => {
    div.classList.remove('enter-right','enter-left');
    div.classList.add('active');
  }));

  refreshDots();
  buildDots();

  // Scroll stage back to top
  setTimeout(() => window.scrollTo({ top: 0, behavior: 'smooth' }), 60);
}

function next() {
  const nxt = current + 1;
  if (nxt >= CARDS.length) return;
  if (nxt === 9 && !lessonDone) {
    const miss = LESSON_IDXS.filter(i => !visited.has(i)).length;
    showToast(`🔒 Faltan ${miss} tarjeta(s) por visitar / ${miss} card(s) remaining`);
    return;
  }
  nav(nxt, 'forward');
}
function prev() { if (current > 0) nav(current - 1, 'back'); }

function tryQuiz() {
  checkLessonDone();
  if (lessonDone) { nav(9, 'forward'); return; }
  const miss = LESSON_IDXS.filter(i => !visited.has(i)).length;
  showToast(`🔒 Visita ${miss} tarjeta(s) más para desbloquear el quiz`);
}

/* ═══════════════════════════════════════════════════
   CARD RENDER DISPATCH
═══════════════════════════════════════════════════ */
function renderCard(c) {
  switch(c.type) {
    case 'hero':    return renderHero();
    case 'lesson':  return renderLesson(c);
    case 'quiz':    return renderQuiz();
    case 'results': return renderResults();
  }
  return '';
}

/* ── HERO ─────────────────────────────────────────── */
function renderHero() {
  return `
  <div class="hero-inner">
    <div class="hero-shield">🛡️</div>
    <div class="hero-title">Ciberseguridad</div>
    <div class="hero-sub">Cómo estar seguros en internet</div>
    <div class="hero-en">How to Stay Safe Online</div>
    <div class="hero-tags">
      <span class="h-tag" style="background:var(--blue)">📘 Vocabulario</span>
      <span class="h-tag" style="background:var(--green)">✅ Práctica</span>
      <span class="h-tag" style="background:var(--orange)">🔒 Seguridad</span>
    </div>
    <div class="hero-std">Standard 6 Spanish &nbsp;·&nbsp; Sesión 1 &amp; 2</div>
  </div>
  <div class="card-foot">
    <span class="foot-hint">🇬🇧 <em>Navigate all 8 lesson cards to unlock the final quiz.</em></span>
    <button class="btn btn-gold" onclick="next()">Comenzar &rarr;</button>
  </div>`;
}

/* ── LESSON WRAPPER ───────────────────────────────── */
function renderLesson(c) {
  const h = c.head;
  const isLast = (current === 8);
  return `
  <div class="card-head" style="background:${h.bg}">
    <div class="ch-icon" style="background:${h.iconBg};color:${h.bg}">${h.icon}</div>
    <div class="ch-titles">
      <div class="ch-phase">${h.phase}</div>
      <div class="ch-title">${h.es}</div>
      <div class="ch-en">${h.en}</div>
    </div>
  </div>
  <div class="card-body">${lessonBody(c)}</div>
  <div class="card-foot">
    <span class="foot-hint">🇬🇧 <em>${c.eng}</em></span>
    <div style="display:flex;gap:.6rem;align-items:center">
      <button class="btn btn-ghost" onclick="prev()">&#8592; Atrás</button>
      ${isLast
        ? `<button class="btn btn-gold" onclick="tryQuiz()">🎯 Quiz &rarr;</button>`
        : `<button class="btn btn-gold" onclick="next()">Siguiente &rarr;</button>`}
    </div>
  </div>`;
}

/* ── LESSON BODY SWITCH ───────────────────────────── */
function lessonBody(c) {
  switch(c.id) {
    case 'obj':       return bodyObj();
    case 'vocab':     return bodyVocab();
    case 'gesture':   return bodyGesture();
    case 'models':    return bodyModels();
    case 'scenarios': return bodyScenarios();
    case 'danger':    return bodyDanger();
    case 'rules':     return bodyRules();
    case 'summary':   return bodySummary();
  }
  return '';
}

function bodyObj() {
  return [
    { icon:'🛡️', c:'var(--blue)',   es:'Aprender vocabulario clave de ciberseguridad',      en:'Learn key cybersecurity vocabulary' },
    { icon:'✏️', c:'var(--green)',  es:'Construir oraciones completas en español',           en:'Build complete sentences in Spanish' },
    { icon:'👥', c:'var(--orange)', es:'Resolver problemas reales de seguridad en línea',    en:'Solve real online safety problems' },
    { icon:'📋', c:'var(--green)',  es:'Escribir reglas para usar tecnología con seguridad', en:'Write rules for safe technology use' },
  ].map(o => `
    <div class="obj-item" style="border-left:5px solid ${o.c}">
      <div class="obj-icon">${o.icon}</div>
      <div>
        <div class="obj-es" style="color:${o.c}">${o.es}</div>
        <div class="obj-en">${o.en}</div>
      </div>
    </div>`).join('');
}

function bodyVocab() {

function buildQ(q, qi) {
  const locked = qLocked[qi];
  let opts = '';
  if (q.type === 'mc') {
    opts = `<div class="qq-opts">${q.opts.map((o,oi) => {
      let cls = 'qq-opt';
      if (locked) {
        cls += ' locked';
        if (oi === q.ans)                               cls += ' correct';
        else if (oi === qAnswers[qi] && oi !== q.ans)   cls += ' wrong';
      } else if (qAnswers[qi] === oi) cls += ' sel';
      return `<div class="${cls}" id="opt-${qi}-${oi}" onclick="selMC(${qi},${oi})">
        <span class="opt-dot">${String.fromCharCode(65+oi)}</span>
        <span>${o}</span>
      </div>`;
    }).join('')}</div>`;
  } else {
    const tCls = 'tf-btn' + (locked
      ? (q.ans===true  ? ' correct' : qAnswers[qi]===true  ? ' wrong' : '')
      : (qAnswers[qi]===true  ? ' sel' : '')) + (locked ? ' locked' : '');
    const fCls = 'tf-btn' + (locked
      ? (q.ans===false ? ' correct' : qAnswers[qi]===false ? ' wrong' : '')
      : (qAnswers[qi]===false ? ' sel' : '')) + (locked ? ' locked' : '');
    opts = `<div class="tf-wrap">
      <button class="${tCls}" id="tf-${qi}-t" onclick="selTF(${qi},true)">✅ Verdadero / True</button>
      <button class="${fCls}" id="tf-${qi}-f" onclick="selTF(${qi},false)">❌ Falso / False</button>
    </div>`;
  }
  const fb = locked
    ? `<div class="qq-fb show ${qAnswers[qi]===q.ans?'ok':'err'}">${
        qAnswers[qi]===q.ans ? '✅ ¡Correcto! / Correct!' :
        '❌ ' + (q.type==='mc' ? `Correcta: "${q.opts[q.ans]}"` : `Correct: ${q.ans?'Verdadero/True':'Falso/False'}`)
      }</div>`
    : `<div class="qq-fb" id="fb-${qi}"></div>`;
  return `
  <div class="quiz-q">
    <div class="qq-num">Pregunta ${qi+1} / Question ${qi+1} of ${QUESTIONS.length}</div>
    <div class="qq-es">${q.es}</div>
    <div class="qq-en">${q.en}</div>
    ${opts}${fb}
  </div>`;
}

   INTERACTIVE HANDLERS
═══════════════════════════════════════════════════ */
function checkSentences() {
  [0,1,2].forEach(i => {
    const inp = document.getElementById(`sb-${i}`);
    const fb  = document.getElementById(`sbfb-${i}`);
    if (!inp || !fb) return;
    const val = inp.value.trim().toLowerCase();
    const key = inp.dataset.key;
    if (!val) { fb.textContent = '⚠️ Escribe algo. / Write something.'; fb.className = 'sb-fb err'; return; }
    if (!val.includes(key)) {
      fb.textContent = `❌ Intenta incluir la palabra "${key}" en tu oración.`; fb.className = 'sb-fb err';
    } else {
      fb.textContent = '✅ ¡Bien! / Good!'; fb.className = 'sb-fb ok';
    }
  });
}

function showScenario(key) {
  const s = SCENARIOS[key];
  document.getElementById('sc-prob-es').textContent = s.prob_es;
  document.getElementById('sc-prob-en').textContent = s.prob_en;
  document.getElementById('sc-sol-es').innerHTML    = s.sol_es.replace(/\n/g,'<br>');
  document.getElementById('sc-sol-en').innerHTML    = s.sol_en.replace(/\n/g,'<br>');
  const ans = document.getElementById('scAnswer');
  ans.classList.add('show');
  ['A','B','C'].forEach(k => {
    const el = document.getElementById(`sc-${k}`);
    if (el) el.classList.toggle('sel-sc', k === key);
  });
  setTimeout(() => ans.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

function selMC(qi, oi) {
  if (qLocked[qi]) return;
  qAnswers[qi] = oi;
  document.querySelectorAll(`[id^="opt-${qi}-"]`).forEach(el => el.classList.remove('sel'));
  const el = document.getElementById(`opt-${qi}-${oi}`);
  if (el) el.classList.add('sel');
  updateQProg();
}

function selTF(qi, val) {
  if (qLocked[qi]) return;
  qAnswers[qi] = val;
  const t = document.getElementById(`tf-${qi}-t`);
  const f = document.getElementById(`tf-${qi}-f`);
  if (t) t.classList.remove('sel');
  if (f) f.classList.remove('sel');
  const target = document.getElementById(`tf-${qi}-${val?'t':'f'}`);
  if (target) target.classList.add('sel');
  updateQProg();
}

function updateQProg() {
  const answered = qAnswers.filter(a => a !== null).length;
  const fill = document.getElementById('qProgFill');
  if (fill) fill.style.width = (answered / QUESTIONS.length * 100) + '%';
  const lbl = document.querySelector('.quiz-prog-label');
  if (lbl) lbl.textContent = `${answered} de ${QUESTIONS.length} respondidas / answered`;
}

function submitQuiz() {
  const unanswered = qAnswers.filter(a => a === null).length;
  if (unanswered > 0) { showToast(`⚠️ ${unanswered} pregunta(s) sin responder / unanswered`); return; }
  qScore = 0;
  QUESTIONS.forEach((q, qi) => {
    if (qAnswers[qi] === q.ans) qScore++;
    qLocked[qi] = true;
  });
  qSubmitted = true;
  // Re-render quiz in place
  const active = document.querySelector('.card.active');
  if (active) active.innerHTML = renderQuiz();
}

function retake() {
  qAnswers   = new Array(QUESTIONS.length).fill(null);
  qLocked    = new Array(QUESTIONS.length).fill(false);
  qScore     = 0;
  qSubmitted = false;
  nav(9, 'back');
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'p', unit:'mm', format:'a4' });
  const W=210, M=18, CW=W-M*2;
  let y=0;
  function chk(n=16){ if(y+n>275){ doc.addPage(); y=20; } }

  // Cover
  doc.setFillColor(11,25,41); doc.rect(0,0,210,78,'F');
  doc.setFontSize(28); doc.setFont('helvetica','bold'); doc.setTextColor(245,200,66);
  doc.text('CIBERSEGURIDAD', W/2, 30, {align:'center'});
  doc.setFontSize(14); doc.setFont('helvetica','italic'); doc.setTextColor(180,210,255);
  doc.text('Quiz Final — Standard 6 Spanish', W/2, 43, {align:'center'});
  doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(110,140,170);
  doc.text(new Date().toLocaleDateString('en-BZ',{year:'numeric',month:'long',day:'numeric'}), W/2, 55, {align:'center'});
  const pct = Math.round(qScore/QUESTIONS.length*100);
  doc.setFillColor(245,200,66); doc.roundedRect(W/2-34,62,68,14,3,3,'F');
  doc.setFontSize(12); doc.setFont('helvetica','bold'); doc.setTextColor(11,25,41);
  doc.text(`Score: ${qScore} / ${QUESTIONS.length}  (${pct}%)`, W/2, 71, {align:'center'});
  y = 88;

  doc.setFillColor(21,101,192); doc.rect(M,y,CW,9,'F');
  doc.setFontSize(10.5); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
  doc.text('ANSWER SUMMARY / RESUMEN DE RESPUESTAS', M+4, y+6);
  y += 14;

  QUESTIONS.forEach((q,qi) => {
    const ok = qAnswers[qi] === q.ans;
    chk(28);
    doc.setFillColor(ok?232:255, ok?245:235, ok?233:238);
    doc.roundedRect(M,y,CW,22,2,2,'F');
    doc.setDrawColor(ok?46:192, ok?125:39, ok?50:39);
    doc.setLineWidth(.4); doc.roundedRect(M,y,CW,22,2,2,'S');
    doc.setFillColor(ok?46:192, ok?125:39, ok?50:39);
    doc.circle(M+6, y+6, 4,'F');
    doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(255,255,255);
    doc.text(String(qi+1), M+6, y+6.5, {align:'center',baseline:'middle'});
    doc.setFontSize(10); doc.text(ok?'✓':'✗', M+CW-7, y+8, {align:'center'});
    doc.setFontSize(8.5); doc.setFont('helvetica','bold'); doc.setTextColor(26,35,50);
    const qL = doc.splitTextToSize(q.es, CW-20);
    doc.text(qL, M+13, y+6);
    doc.setFontSize(7.5); doc.setFont('helvetica','italic'); doc.setTextColor(74,111,165);
    const eL = doc.splitTextToSize(q.en, CW-20);
    doc.text(eL, M+13, y+6+(qL.length*4));
    doc.setFontSize(7); doc.setFont('helvetica','normal');
    doc.setTextColor(ok?46:192, ok?125:39, ok?50:39);
    const aT = q.type==='mc' ? 'Correct: '+q.opts[q.ans] : 'Correct: '+(q.ans?'True/Verdadero':'False/Falso');
    doc.text(aT.slice(0,95), M+13, y+18);
    y += 27;
  });

  chk(22); y += 5;
  doc.setFillColor(11,25,41); doc.rect(M,y,CW,9,'F');
  doc.setFontSize(10); doc.setFont('helvetica','bold'); doc.setTextColor(245,200,66);
  doc.text('VOCABULARIO CLAVE / KEY VOCABULARY', M+4, y+6);
  y += 14;

  [['Ciberseguridad','Cybersecurity — protecting accounts and information online'],
   ['Contraseña','Password — a secret word or code to access accounts'],
   ['Información personal','Personal Information — name, address, phone number, etc.'],
   ['Proteger','To Protect — prevent others from accessing your data'],
   ['Seguridad','Safety / Security — the state of being protected']
  ].forEach(([es,en]) => {
    chk(12);
    doc.setFillColor(232,243,254); doc.roundedRect(M,y,CW,9,2,2,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(21,101,192);
    doc.text(es, M+4, y+6);
    doc.setFont('helvetica','italic'); doc.setTextColor(74,111,165); doc.setFontSize(8);
    doc.text(en, M+52, y+6);
    y += 13;
  });

  chk(16); y += 6;
  doc.setFillColor(244,246,249); doc.rect(M,y,CW,12,'F');
  doc.setFontSize(8.5); doc.setFont('helvetica','italic'); doc.setTextColor(110,125,145);
  doc.text('"La ciberseguridad empieza con nosotros." — Standard 6 Spanish', W/2, y+7.5, {align:'center'});

  doc.save(`Quiz_Ciberseguridad_${new Date().toISOString().slice(0,10)}.pdf`);
  showToast('📄 PDF guardado / PDF saved');
}

/* ═══════════════════════════════════════════════════
   TOAST + KEYBOARD + SWIPE
═══════════════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  next();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')    prev();
});

let _tx = 0;
document.addEventListener('touchstart', e => { _tx = e.touches[0].clientX; }, { passive:true });
document.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - _tx;
  if (Math.abs(dx) > 55) { dx < 0 ? next() : prev(); }
}, { passive:true });

/* ═══════════════════════════════════════════════════
   INIT — render card 0 directly, no animation
   (nav() guards against idx===current so can never
    bootstrap itself from zero; we render directly instead)
═══════════════════════════════════════════════════ */
(function initFirstCard() {
  visited.add(0);
  current = 0;
  buildDots();

  const stage = document.getElementById('stage');
  const div   = document.createElement('div');
  div.className = 'card active';   // straight to active, no slide-in animation
  div.innerHTML = renderCard(CARDS[0]);
  stage.appendChild(div);

  refreshDots();
})();
</script>
